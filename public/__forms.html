<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Form Detection</title>
  </head>
  <body>
    <form name="audit-request" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="audit-request" />
      <input name="bot-field" type="text" />
      <input name="nombre" type="text" />
      <input name="email" type="email" />
      <input name="plataforma" type="text" />
      <textarea name="mensaje"></textarea>
    </form>
  </body>
</html>
